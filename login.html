<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlaylistMaker — Đăng nhập</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-base); }

    .auth-wrap {
      width: min(92vw, 420px);
    }

    .auth-logo {
      display:flex; align-items:center; gap:.65rem;
      justify-content:center; margin-bottom:2rem;
    }
    .auth-logo-mark {
      width:42px; height:42px; border-radius:10px;
      background:var(--accent);
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem;
    }
    .auth-logo-text { font-size:1.4rem; font-weight:800; }

    .auth-card {
      background: var(--bg-layer);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    /* Tab switcher */
    .auth-tabs {
      display:grid; grid-template-columns:1fr 1fr;
      border-bottom:1px solid var(--border);
    }
    .auth-tab {
      padding:.85rem; text-align:center;
      font-weight:700; font-size:.875rem;
      color:var(--text-muted); cursor:pointer;
      background:none; border:none;
      border-bottom:2px solid transparent;
      transition:color var(--transition), border-color var(--transition);
      font-family:var(--font-body);
    }
    .auth-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    .auth-body { padding:1.75rem; }

    .auth-panel { display:none; }
    .auth-panel.active { display:block; animation:fadeIn .25s ease; }

    /* Social buttons */
    .social-btn {
      display:flex; align-items:center; justify-content:center; gap:.6rem;
      width:100%; padding:.6rem;
      background:var(--bg-elevated); border:1px solid var(--border-bright);
      border-radius:var(--radius-sm); color:var(--text-primary);
      font-size:.875rem; font-weight:600; cursor:pointer;
      transition:background var(--transition), border-color var(--transition);
      font-family:var(--font-body);
    }
    .social-btn:hover { background:var(--bg-hover); border-color:var(--accent); }
    .social-icon { font-size:1.1rem; }

    .divider {
      display:flex; align-items:center; gap:.75rem;
      color:var(--text-muted); font-size:.78rem; margin:.05rem 0;
    }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

    .error-msg {
      background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
      border-radius:var(--radius-sm); padding:.6rem .85rem;
      color:#ef4444; font-size:.82rem; display:none; margin-bottom:.75rem;
    }
    .error-msg.show { display:block; }

    .success-msg {
      background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3);
      border-radius:var(--radius-sm); padding:.6rem .85rem;
      color:#22c55e; font-size:.82rem; display:none; margin-bottom:.75rem;
    }
    .success-msg.show { display:block; }

    .password-wrap { position:relative; }
    .toggle-pw {
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--text-muted); cursor:pointer;
      font-size:.85rem; padding:2px 4px;
    }
    .toggle-pw:hover { color:var(--text-primary); }

    .auth-footer { text-align:center; margin-top:1.25rem; font-size:.8rem; color:var(--text-muted); }
    .auth-footer a { color:var(--accent); font-weight:600; }
  </style>
</head>
<body>

<div class="auth-wrap">

  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-mark">🎵</div>
    <span class="auth-logo-text">PlaylistMaker</span>
  </div>

  <!-- Card -->
  <div class="auth-card">

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Đăng nhập</button>
      <button class="auth-tab" data-tab="register">Đăng ký</button>
    </div>

    <div class="auth-body">

      <!-- ── LOGIN ── -->
      <div class="auth-panel active" id="panel-login">
        <div class="error-msg"   id="login-error"></div>
        <div class="success-msg" id="login-success"></div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="you@example.com" />
        </div>
        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <div class="password-wrap">
            <input type="password" id="login-password" class="form-control" placeholder="••••••••" />
            <button class="toggle-pw" data-target="login-password">👁</button>
          </div>
        </div>

        <div class="d-flex justify-content-end mb-3">
          <a href="#" class="small" style="color:var(--accent)" id="forgot-link">Quên mật khẩu?</a>
        </div>

        <button class="btn btn-accent btn-ripple w-100 mb-3" id="login-btn">Đăng nhập</button>

        <div class="divider">hoặc</div>

        <div class="d-flex gap-2 mt-3">
          <button class="social-btn" id="google-login">
            <span class="social-icon">🌐</span> Google
          </button>
          <button class="social-btn" id="facebook-login">
            <span class="social-icon">📘</span> Facebook
          </button>
        </div>
      </div>

      <!-- ── REGISTER ── -->
      <div class="auth-panel" id="panel-register">
        <div class="error-msg"   id="register-error"></div>
        <div class="success-msg" id="register-success"></div>

        <div class="mb-3">
          <label class="form-label">Họ tên <span class="text-danger">*</span></label>
          <input type="text" id="reg-name" class="form-control" placeholder="Nguyễn Văn A" />
        </div>
        <div class="mb-3">
          <label class="form-label">Email <span class="text-danger">*</span></label>
          <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" />
        </div>
        <div class="mb-3">
          <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
          <div class="password-wrap">
            <input type="password" id="reg-password" class="form-control" placeholder="Tối thiểu 6 ký tự" />
            <button class="toggle-pw" data-target="reg-password">👁</button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
          <div class="password-wrap">
            <input type="password" id="reg-confirm" class="form-control" placeholder="Nhập lại mật khẩu" />
            <button class="toggle-pw" data-target="reg-confirm">👁</button>
          </div>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="agree-terms" />
          <label class="form-check-label small" for="agree-terms" style="color:var(--text-secondary)">
            Tôi đồng ý với <a href="#" style="color:var(--accent)">Điều khoản sử dụng</a>
          </label>
        </div>

        <button class="btn btn-accent btn-ripple w-100" id="register-btn">Tạo tài khoản</button>
      </div>

    </div><!-- /auth-body -->
  </div><!-- /auth-card -->

  <div class="auth-footer mt-3">
    <a href="index.html">← Quay về trang chủ</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script>
$(document).ready(function () {

  // ── Nếu đã đăng nhập → redirect ──────────────────────────
  const session = API.getSession();
  if (session) {
    window.location.href = session.role === 'admin' ? 'admin.html' : 'index.html';
    return;
  }

  // ── Tab switch ────────────────────────────────────────────
  $('.auth-tab').on('click', function () {
    const tab = $(this).data('tab');
    $('.auth-tab').removeClass('active');
    $(this).addClass('active');
    $('.auth-panel').removeClass('active');
    $('#panel-' + tab).addClass('active');
    clearErrors();
  });

  // ── Toggle password ───────────────────────────────────────
  $('.toggle-pw').on('click', function () {
    const input = document.getElementById($(this).data('target'));
    input.type = input.type === 'password' ? 'text' : 'password';
    $(this).text(input.type === 'password' ? '👁' : '🙈');
  });

  // ── Login ─────────────────────────────────────────────────
  $('#login-btn').on('click', async function () {
    clearErrors();
    const email    = $('#login-email').val().trim();
    const password = $('#login-password').val();

    if (!email || !password) {
      showError('login', 'Vui lòng điền đầy đủ thông tin');
      return;
    }

    setLoading('#login-btn', true, 'Đang đăng nhập…');
    try {
      const user = await API.login(email, password);
      showSuccess('login', '✅ Đăng nhập thành công! Đang chuyển trang…');
      setTimeout(() => {
        window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
      }, 800);
    } catch (err) {
      showError('login', err.message);
      setLoading('#login-btn', false, 'Đăng nhập');
    }
  });

  // Enter để login
  $('#login-email, #login-password').on('keydown', function (e) {
    if (e.key === 'Enter') $('#login-btn').trigger('click');
  });

  // ── Register ──────────────────────────────────────────────
  $('#register-btn').on('click', async function () {
    clearErrors();
    const name     = $('#reg-name').val().trim();
    const email    = $('#reg-email').val().trim();
    const password = $('#reg-password').val();
    const confirm  = $('#reg-confirm').val();
    const agreed   = $('#agree-terms').is(':checked');

    if (!name || !email || !password || !confirm) {
      showError('register', 'Vui lòng điền đầy đủ thông tin');
      return;
    }
    if (password.length < 6) {
      showError('register', 'Mật khẩu phải có ít nhất 6 ký tự');
      return;
    }
    if (password !== confirm) {
      showError('register', 'Mật khẩu xác nhận không khớp');
      return;
    }
    if (!agreed) {
      showError('register', 'Bạn cần đồng ý với điều khoản sử dụng');
      return;
    }

    setLoading('#register-btn', true, 'Đang tạo tài khoản…');
    try {
      await API.register(name, email, password);
      showSuccess('register', '🎉 Tạo tài khoản thành công! Đang chuyển trang…');
      setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    } catch (err) {
      showError('register', err.message);
      setLoading('#register-btn', false, 'Tạo tài khoản');
    }
  });

  // Enter để register
  $('#reg-name, #reg-email, #reg-password, #reg-confirm').on('keydown', function (e) {
    if (e.key === 'Enter') $('#register-btn').trigger('click');
  });

  // ── Social (placeholder) ──────────────────────────────────
  $('#google-login, #facebook-login').on('click', function () {
    Utils.toast('Tính năng đang phát triển 🚧', 'info');
  });

  // ── Forgot password ───────────────────────────────────────
  $('#forgot-link').on('click', function (e) {
    e.preventDefault();
    Utils.toast('Tính năng đang phát triển 🚧', 'info');
  });

  // ── Helpers ───────────────────────────────────────────────
  function showError(panel, msg) {
    $('#' + panel + '-error').text(msg).addClass('show');
  }
  function showSuccess(panel, msg) {
    $('#' + panel + '-success').text(msg).addClass('show');
  }
  function clearErrors() {
    $('.error-msg, .success-msg').removeClass('show').text('');
  }
  function setLoading(selector, loading, text) {
    $(selector).prop('disabled', loading).text(text);
  }
});
</script>
</body>
</html>
